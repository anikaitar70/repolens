# Production compose — binds to localhost only so nginx handles public traffic.
# Does NOT use ports 80/443 (existing site stays untouched).
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8010:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      REPORT_PROVIDER: ${REPORT_PROVIDER:-groq}
      REPORT_TOP_FINDINGS_LIMIT: ${REPORT_TOP_FINDINGS_LIMIT:-15}
      REPORT_MAX_PAYLOAD_BYTES: ${REPORT_MAX_PAYLOAD_BYTES:-12000}
      REPORT_TIMEOUT_SECONDS: ${REPORT_TIMEOUT_SECONDS:-120}
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-26214400}
      MAX_EXTRACTED_SIZE: ${MAX_EXTRACTED_SIZE:-104857600}
      MAX_EXTRACTED_FILES: ${MAX_EXTRACTED_FILES:-5000}
      MAX_SINGLE_FILE_SIZE: ${MAX_SINGLE_FILE_SIZE:-10485760}
      MAX_ANALYSIS_SECONDS: ${MAX_ANALYSIS_SECONDS:-120}
      UPLOAD_DIRECTORY: /tmp/repolens/uploads
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DEBUG: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - repolens_uploads:/tmp/repolens/uploads

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  repolens_uploads:
