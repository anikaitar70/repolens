services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-52428800}
      MAX_EXTRACTED_SIZE: ${MAX_EXTRACTED_SIZE:-209715200}
      MAX_EXTRACTED_FILES: ${MAX_EXTRACTED_FILES:-10000}
      UPLOAD_DIRECTORY: ${UPLOAD_DIRECTORY:-/tmp/repolens/uploads}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      DEBUG: ${DEBUG:-false}
    volumes:
      - repolens_uploads:/tmp/repolens/uploads

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend

volumes:
  repolens_uploads:
