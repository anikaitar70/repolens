services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      REPORT_PROVIDER: ${REPORT_PROVIDER:-groq}
      REPORT_TOP_FINDINGS_LIMIT: ${REPORT_TOP_FINDINGS_LIMIT:-15}
      REPORT_MAX_PAYLOAD_BYTES: ${REPORT_MAX_PAYLOAD_BYTES:-12000}
      REPORT_TIMEOUT_SECONDS: ${REPORT_TIMEOUT_SECONDS:-60}
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-104857600}
      MAX_EXTRACTED_SIZE: ${MAX_EXTRACTED_SIZE:-262144000}
      MAX_EXTRACTED_FILES: ${MAX_EXTRACTED_FILES:-5000}
      MAX_SINGLE_FILE_SIZE: ${MAX_SINGLE_FILE_SIZE:-10485760}
      MAX_ANALYSIS_SECONDS: ${MAX_ANALYSIS_SECONDS:-60}
      UPLOAD_DIRECTORY: ${UPLOAD_DIRECTORY:-/tmp/repolens/uploads}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      DEBUG: ${DEBUG:-false}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - repolens_uploads:/tmp/repolens/uploads

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  repolens_uploads:
